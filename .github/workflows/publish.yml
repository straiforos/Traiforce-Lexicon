name: Publish to npmjs.com (Trusted Publishing)

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    # id-token:write is required for OIDC-based Trusted Publishing on npmjs.com.
    # No NPM_TOKEN is used here; authentication is handled by the OIDC handshake.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Generate lexicon types
        run: npm run gen

      - name: Build TypeScript
        run: npm run build

      - name: Publish to npmjs.com with provenance
        run: npm publish --provenance --access public
